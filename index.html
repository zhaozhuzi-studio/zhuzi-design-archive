<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Design Archive</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/framer-motion/dist/framer-motion.umd.js"></script>
<style>
body { font-family: Arial, Helvetica, sans-serif; margin:0; background:#fefcf6; }
.container { max-width: 960px; margin: 0 auto; padding: 2rem; }
img { max-width:100%; border-radius:8px; transition: all .3s ease; }
.thumbnail { width: 80px; height: 80px; object-fit: cover; cursor: pointer; border:2px solid transparent; border-radius:6px; transition: all .2s ease; }
.thumbnail.active { border-color:#000; }
.thumbnail:hover { transform: scale(1.1); }
.product-info { background:white; padding:1rem; border-radius:8px; box-shadow:0 4px 16px rgba(0,0,0,.12); margin-top:1rem; transition: opacity .3s ease; }
.series-buttons button { padding: 6px 12px; border-radius:6px; border:1px solid #ccc; cursor:pointer; margin:4px; background:white; transition:all .2s; }
.series-buttons button.active { background:#000; color:white; border-color:#000; }
</style>
</head>
<body>
<div class="container">
  <div id="gallery"></div>
</div>
<script>
const products = [
  {
    id:1,
    title:'Two-drawer cabinet',
    images:['/images/cabinet-2d-1.png','/images/cabinet-2d-2.png'],
    description:'简单条纹粗把手，油漆表面处理，MDF板材',
    size:'400*400*400mm',
    material:'MDF',
    client:'DE',
    recommendedFor:'中产阶级家庭'
  },
  {
    id:2,
    title:'Three-drawer cabinet',
    images:['/images/cabinet-3d-1.png','/images/cabinet-3d-2.png'],
    description:'三抽设计，简洁现代',
    size:'400*400*600mm',
    material:'MDF',
    client:'DE',
    recommendedFor:'中产阶级家庭'
  }
];

let selectedProduct = products[0];
let selectedImage = selectedProduct.images[0];

function renderGallery(){
  const container = document.getElementById('gallery');
  container.innerHTML = `
    <div><img src='${selectedImage}' id='mainImage' /></div>
    <div style='display:flex; gap:8px; margin-top:12px;'>
      ${selectedProduct.images.map(img=>`<img src='${img}' class='thumbnail ${img===selectedImage?'active':''}' onclick='selectImage("${img}")'/>`).join('')}
    </div>
    <div class='product-info' id='productInfo'>
      <h2>${selectedProduct.title}</h2>
      <p>${selectedProduct.description}</p>
      <p><strong>Size:</strong> ${selectedProduct.size}</p>
      <p><strong>Material:</strong> ${selectedProduct.material}</p>
      <p><strong>Client:</strong> ${selectedProduct.client}</p>
      <p><strong>Recommended for:</strong> ${selectedProduct.recommendedFor}</p>
    </div>
    <div class='series-buttons'>
      ${products.map(p=>`<button class='${p.id===selectedProduct.id?'active':''}' onclick='selectProduct(${p.id})'>${p.title}</button>`).join('')}
    </div>
  `;
}

function selectImage(img){
  selectedImage = img;
  renderGallery();
}

function selectProduct(id){
  selectedProduct = products.find(p=>p.id===id);
  selectedImage = selectedProduct.images[0];
  renderGallery();
}

renderGallery();
</script>
</body>
</html>
