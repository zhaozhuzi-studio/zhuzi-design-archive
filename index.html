/* 顶部固定区域 */
.archive-header { position: sticky; top:0; z-index:200; background:rgba(244,240,234,0.94); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); box-shadow:0 10px 30px rgba(70,55,40,0.08); border-bottom:1px solid rgba(120,100,80,0.08); padding:24px 48px 28px; overflow:hidden; perspective:1000px; }
.leaf-shadow { position:absolute; top:-20px; left:80px; width:340px; height:180px; pointer-events:none; opacity:0.22; background: radial-gradient(ellipse at 20% 30%, rgba(120,130,90,0.18) 0%, rgba(120,130,90,0) 55%), radial-gradient(ellipse at 45% 20%, rgba(120,130,90,0.14) 0%, rgba(120,130,90,0) 50%), radial-gradient(ellipse at 70% 35%, rgba(120,130,90,0.12) 0%, rgba(120,130,90,0) 52%); filter: blur(16px); transform: rotate(-8deg); transition: transform 0.2s ease-out; }
.header-content { position:relative; z-index:2; display:flex; flex-direction:column; gap:16px; }
.back-button { font-size:0.95rem; color:#4d4339; text-decoration:none; }
.title-category { display:flex; flex-direction:column; gap:8px; }
.title-category h1 { margin:0; font-size:2.6rem; line-height:1.2; font-weight:600; position:relative; z-index:2; }
.category-filters { display:flex; gap:12px; flex-wrap:wrap; align-items:center; transition:transform 0.2s ease-out; }
.category-filters button { border:1px solid rgba(120,100,80,0.18); background:rgba(255,255,255,0.45); color:#4d4339; border-radius:999px; padding:10px 18px; cursor:pointer; transition:all 0.25s ease, box-shadow 0.3s ease; position:relative; }
.category-filters button::after { content:""; position:absolute; inset:0; border-radius:999px; box-shadow:0 0 0px rgba(255,200,160,0); transition:box-shadow 0.3s ease; pointer-events:none; }
.category-filters button:hover::after { box-shadow:0 0 12px rgba(255,200,160,0.38); }
.category-filters button:hover { background:rgba(255,255,255,0.82); transform:translateY(-2px); }
.category-filters button.active { background:#2f2620; color:#fff; border-color:#2f2620; box-shadow:0 6px 16px rgba(47,38,32,0.16); }

<script>
// 原本你的密码验证、滑轨、作品展示、缩略图切换、上传编辑删除逻辑保持

// 新增顶部鼠标微视差
const header = document.getElementById('archiveHeader');
const leaf = document.getElementById('leafShadow');
const filters = header.querySelector('.category-filters');
header.addEventListener('mousemove', (e) => {
  const width = header.offsetWidth;
  const mouseX = e.clientX;
  const move = (mouseX - width/2)/50;
  leaf.style.transform = `rotate(-8deg) translateX(${move}px)`;
  filters.style.transform = `translateX(${move/2}px)`;
});
</script>
